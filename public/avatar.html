<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brit — Animated Avatar</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#080d14;
    display:flex;
    justify-content:center;
    align-items:center;
    height:auto; overflow:hidden;
    font-family:'Segoe UI',sans-serif;
  }
  .avatar-wrapper {
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:24px;
  }
  .avatar-container {
    animation: entry 1.2s cubic-bezier(0.16,1,0.3,1) both, float 5s ease-in-out 1.2s infinite;
    width:min(340px,92vw);
    filter:drop-shadow(0 20px 40px rgba(0,0,0,0.6));
  }
  .avatar-container:hover {
    filter:drop-shadow(0 24px 50px rgba(0,191,255,0.2)) drop-shadow(0 20px 40px rgba(0,0,0,0.6));
    transition:filter 0.4s ease;
  }
  .avatar-container svg {
    width:100%; height:auto; display:block;
    animation:breathe 4s ease-in-out 1.5s infinite;
    transform-origin:center bottom;
  }
  @keyframes entry {
    from { opacity:0; transform:translateY(30px) scale(0.95); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes float {
    0%,100% { transform:translateY(0px); }
    50%     { transform:translateY(-12px); }
  }
  @keyframes breathe {
    0%,100% { transform:scaleX(1) scaleY(1); }
    45%,55% { transform:scaleX(1.008) scaleY(1.004); }
  }
  .name-tag {
    opacity:0;
    animation:fadeUp 0.8s ease 1.6s both;
    text-align:center;
  }
  .name-tag h2 { color:#fff; font-size:1.4rem; font-weight:600; letter-spacing:0.05em; }
  .name-tag p  { color:#00BFFF; font-size:0.8rem; letter-spacing:0.15em; text-transform:uppercase; margin-top:4px; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .glow-ring {
    position:absolute; bottom:60px; width:200px; height:20px;
    border-radius:50%;
    background:radial-gradient(ellipse, rgba(0,191,255,0.15) 0%, transparent 70%);
    animation:glowPulse 5s ease-in-out 1.2s infinite;
    pointer-events:none;
  }
  @keyframes glowPulse {
    0%,100% { opacity:0.4; transform:scaleX(1); }
    50%     { opacity:0.8; transform:scaleX(1.15); }
  }
</style>
</head>
